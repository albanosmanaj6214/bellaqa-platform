version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bellaqa-postgres
    environment:
      POSTGRES_DB: bellaqa
      POSTGRES_USER: bellaqa
      POSTGRES_PASSWORD: BellaQA@2025!
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bellaqa']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bellaqa-redis
    command: redis-server --requirepass BellaQARedis@2025
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: bellaqa-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: bellaqa
      MINIO_ROOT_PASSWORD: BellaQAMinio@2025
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    restart: unless-stopped

  rembg:
    image: danielgatis/rembg:latest
    container_name: bellaqa-rembg
    ports:
      - '7000:7000'
    command: s --host 0.0.0.0 --port 7000
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bellaqa-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://bellaqa:BellaQA@2025!@postgres:5432/bellaqa
      REDIS_URL: redis://:BellaQARedis@2025@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: bellaqa
      MINIO_SECRET_KEY: BellaQAMinio@2025
      MINIO_BUCKET: bellaqa-products
      REMBG_URL: http://rembg:7000
      JWT_SECRET: BellaQAJWT@SuperSecret2025!
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bellaqa-frontend
    environment:
      NEXT_PUBLIC_API_URL: https://bellaqa.aiaohub.com/api
    ports:
      - '3000:3000'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
